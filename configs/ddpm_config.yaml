# ══════════════════════════════════════════════════════
# ddpm_config.yaml — Denoising Diffusion Probabilistic Model
# Target attack: Noise Injection
# ══════════════════════════════════════════════════════
model: ddpm
denoiser_type: mlp      # MLP beats UNet1D for gene data — no spatial locality assumption
input_dim: 10000        # HVG selection — same gene space as all other models
mlp_hidden_dim: 2048    # Large enough to model pairwise gene interactions at 10k dims
mlp_num_layers: 6
mlp_time_emb_dim: 256
mlp_dropout: 0.1

# Keep UNet params for config compatibility (ignored when denoiser_type=mlp)
unet_model_channels: 128
unet_time_emb_dim: 128
unet_dropout: 0.1

num_timesteps: 1000
beta_schedule: cosine   # Cosine > linear — adds noise more slowly, preserves subtle structure longer
beta_start: 0.0001
beta_end: 0.02

detection_timestep: 500
generation_timestep: 500
detection_threshold: 0.95

device: cuda
batch_size: 10000       # Preprocessing batch size
k_neighbors: 5          # Unused for DDPM
train_batch_size: 1024  # RTX 4090 optimal for MLP + 10k input (was 8 — critically small)
epochs: 200
learning_rate: 0.0003
patience: 25
raw: False