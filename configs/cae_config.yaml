# ══════════════════════════════════════════════════════
# cae_config.yaml — Contrastive Autoencoder
# Target attack: Synthetic Cell Injection
# ══════════════════════════════════════════════════════
model: cae
input_dim: 10000        # HVG selection — NOT PCA. Preserves per-gene signal for injection detection.
hidden_dim: 1024        # Wider hidden layer to model 10k gene interactions (was 512 @ 3k dims)
latent_dim: 128         # Unchanged — sufficient for contrastive embedding space
temperature: 0.5        # InfoNCE temperature — lower = harder negatives, more discriminative
dropout: 0.2
device: cuda

loss_weights:
  alpha: 0.7            # Contrastive loss weight
  beta: 0.3             # Reconstruction loss weight
  cls: 50.0              # Classification head weight (unused without labels)

detection_threshold: 0.95
batch_size: 10000       # Preprocessing batch size
k_neighbors: 5          # Unused for CAE
train_batch_size: 512   # RTX 4090 safe with 10k input + 1024 hidden (was 32 — far too small)
epochs: 200
learning_rate: 0.0003   # Tuned for AdamW + batch_size=512 (linear scaling rule from original)
patience: 25            # More patience since cosine LR can mask temporary plateaus
raw: False